<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout/header :: header"/>
<style>
    .fieldError {
        border-color: #bd2130;
    }
</style>
<script src="http://dmaps.daum.net/map_js_init/postcode.v2.js"></script>
<body>
<div class="container">
    <div th:replace="layout/navbar :: bodyHeader"/>
    <div   th:object="${memberSaveRequestDto}" >
        <div class="form-group">
            <label th:for="username">아이디</label>
            <input type="text" id="username" th:field="*{username}" class="form-control"
                   placeholder="아이디를 입력하세요"
                   th:class="${#fields.hasErrors('username')}? 'form-control fieldError' : 'form-control'">
            <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}">Incorrect date</p>
        </div>
        <div class="form-group">
            <label th:for="password">패스워드</label>
            <input type="password" id="password" th:field="*{password}" class="form-control"
                   placeholder="패스워드를 입력하세요"
                   th:class="${#fields.hasErrors('password')}? 'form-control fieldError' : 'form-control'">
            <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}">Incorrect date</p>
        </div>
        <div class="form-group">
            <label th:for="name">이름</label>
            <input type="text" id="name" th:field="*{name}" class="form-control"
                   placeholder="대표자 이름을 입력하세요"
                   th:class="${#fields.hasErrors('name')}? 'form-control fieldError' : 'form-control'">
            <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Incorrect date</p>
        </div>
        <div class="form-group">
            <label th:for="zipcode">우편번호</label>
            <input type="text" th:field="*{zipcode}" id="zipcode" name="zipcode" class="form-control" placeholder="우편번호 찾기를 이용해주세요"
                   th:class="${#fields.hasErrors('zipcode')}? 'form-control fieldError' : 'form-control'" th:readonly="readonly" >
            <p th:if="${#fields.hasErrors('zipcode')}" th:errors="*{zipcode}">Incorrect date</p>
            <button type="button" class="btn btn-danger" id="btn-postCode"> 우편번호 찾기</button>
        </div>
        <div class="form-group">
            <label th:for="street">도로명 주소</label>
            <input type="text" th:field="*{street}" id="street" name="street" class="form-control" placeholder="우편번호 찾기를 이용해주세요"
                   th:class="${#fields.hasErrors('street')}? 'form-control fieldError' : 'form-control'" th:readonly="readonly">
            <p th:if="${#fields.hasErrors('street')}" th:errors="*{street}">Incorrect date</p>
        </div>
        <div class="form-group">
            <label th:for="detail">상세주소</label>
            <input type="text" th:field="*{detail}" id="detail" name="detail" class="form-control" placeholder="상세주소를 입력하세요"
                   th:class="${#fields.hasErrors('detail')}? 'form-control fieldError' : 'form-control'">
            <p th:if="${#fields.hasErrors('detail')}" th:errors="*{detail}">Incorrect date</p>
        </div>
        <button id="btn-save" class="btn btn-primary">Submit</button>
    </div>
    <br/>
    <div th:replace="layout/footer :: footer"/>
    <script src="/js/member.js"></script>
</div> <!-- /container -->
</body>
</html>
